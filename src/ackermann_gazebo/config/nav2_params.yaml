amcl:
  ros__parameters:
    use_sim_time: True
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 12.0
    laser_min_range: 0.15
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 500
    min_particles: 50
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::OmniMotionModel" # DifferentialMotionModel
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.2 #0.3
    update_min_d: 0.1  #0.15
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: scan
    map_topic: map
    set_initial_pose: true
    always_reset_initial_pose: false  
    first_map_only: false
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator/NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator/NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 20.0 #10.0
    costmap_update_timeout: 0.30
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5 #0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["stopped_goal_checker"]
    controller_plugins: ["FollowPath"]
    use_realtime_priority: false

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3 # 0.5
      movement_time_allowance: 15.0 # 10.0
      
    stopped_goal_checker:
      plugin: "nav2_controller::StoppedGoalChecker"
      stateful: True
      xy_goal_tolerance: 0.25        # Relaxed from 0.15 (25cm is reasonable)
      yaw_goal_tolerance: 0.30       # Relaxed from 0.15 (~17° vs 8.6°)
      trans_stopped_velocity: 0.05   # Robot must be nearly stopped (5cm/s)
      rot_stopped_velocity: 0.10     # Robot must be nearly stopped (~6°/s)
      
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 70 #56
      model_dt: 0.05 #  (1/20 = 0.05) #0.1
      batch_size: 2500
      ax_max: 2.5
      ax_min: -2.5
      ay_max: 0.0 #3.0
      az_max: 3.5
      vx_std: 0.15 #0.2
      vy_std: 0.0 #0.2
      wz_std: 0.3 #0.4
      vx_max: 0.5
      vx_min: -0.35 
      vy_max: 0.0
      wz_max: 1.2 #1.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.3 #0.5
      temperature: 0.3
      gamma: 0.015
      motion_model: "Ackermann"
      visualize: true
      regenerate_noises: true
      
      AckermannConstraints:
        min_turning_r: 0.30
        
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
        
      critics: [
        "ConstraintCritic", 
        "CostCritic", 
        "GoalCritic",
        "GoalAngleCritic", 
        "PathAlignCritic", 
        "PathFollowCritic",
        "PathAngleCritic", 
        "PreferForwardCritic",
        "ObstaclesCritic",
        "VelocityDeadbandCritic"
      ]
      
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0 #4.0
        
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0 #8.0 #5.0
        threshold_to_consider: 0.8 #1.4
        
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight:  8.0 #5.0 #3.0
        threshold_to_consider: 1.0  #0.4 #0.5
        
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0 #3.0 #1.0
        threshold_to_consider: 0.3 #0.5 #0.8
        
# '      TwirlingCritic:
#         enabled: true
#         cost_power: 1
#         cost_weight: 10.0'
        
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0 #3.81
        near_collision_cost: 253
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
        
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0 #14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 3 #4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: True #false
        
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0 #5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.4
        
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0 #2.0 
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 0.8 # 1.0
        mode: 0

            # NEW: Obstacles critic for better dynamic obstacle handling
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        repulsion_weight: 1.5
        critical_weight: 20.0
        consider_footprint: true
        collision_cost: 10000.0
        collision_margin_distance: 0.15
        near_goal_distance: 0.5
        inflation_radius: 0.55 # (only in Humble)
        cost_scaling_factor: 10.0 # (only in Humble)

              
      # NEW: Velocity deadband to prevent oscillations
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0  # High weight to enforce smooth motion
        deadband_velocities: [0.05, 0.05, 0.05]  # [vx, vy, wz]

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 4 #3
      height: 4 #3
      resolution: 0.05
      
      footprint: "[[0.36, 0.195], [0.36, -0.195], [-0.075, -0.195], [-0.075, 0.195]]"
      plugins: ["voxel_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5 #3.0
        inflation_radius: 0.45 #0.35
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5 #3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0 #2.5
          obstacle_min_range: 0.0
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # 使用footprint与local_costmap保持一致
      footprint: "[[0.36, 0.195], [0.36, -0.195], [-0.075, -0.195], [-0.075, 0.195]]"
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5 #3.0
        inflation_radius: 0.45 #0.35
      always_send_full_costmap: True

map_server:
  ros__parameters:
    use_sim_time: True
    yaml_filename: "map.yaml"
    
map_saver:
  ros__parameters:
    use_sim_time: true
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

